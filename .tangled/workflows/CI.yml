when:
  - event: [push]
    branch: [main]
  - event: [pull_request]
    branch: [main]

engine: nixery

dependencies:
  nixpkgs:
    - go
    - golangci-lint
    - gcc  # Needed for CGO_ENABLED=1 (go test -race)

environment:
  CGO_ENABLED: "1"

steps:
  - name: Test
    command: go test -race ./...

  - name: Lint
    command: golangci-lint run ./...
